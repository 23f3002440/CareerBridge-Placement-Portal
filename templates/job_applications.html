<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Job Applications</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h2>Applications for "{{ job.title }}"</h2>
      <a href="/company/dashboard" class="btn btn-secondary mb-3"
        >Back to Dashboard</a
      >

      <table class="table table-bordered">
        <thead class="table-dark">
          <tr>
            <th>Application ID</th>
            <th>Student Name</th>
            <th>Email</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for app in applications %}
          <tr>
            <td>{{ app.id }}</td>
            <td>{{ app.student.name }}</td>
            <td>{{ app.student.email }}</td>
            <td>{{ app.status }}</td>
            <td>
              {% if app.status == "Applied" %}
              <a
                href="/company/application/shortlist/{{ app.id }}"
                class="btn btn-success btn-sm"
                >Shortlist</a
              >
              <a
                href="/company/application/reject/{{ app.id }}"
                class="btn btn-danger btn-sm"
                >Reject</a
              >
              {% endif %}
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
