<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Post New Job</h2>
    <form action="/company/job/new" method="POST">
        <div class="mb-3">
            <label class="form-label">Job Title</label>
            <input type="text" class="form-control" name="title" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Required Skills</label>
            <input type="text" class="form-control" name="skills" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Experience Required</label>
            <input type="text" class="form-control" name="experience" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Salary</label>
            <input type="text" class="form-control" name="salary" required>
        </div>
        <button type="submit" class="btn btn-success">Post Job</button>
        <a href="/company/dashboard" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
