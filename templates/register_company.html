{% extends 'base.html' %} {% block title %}Register Company - CareerBridge{%
endblock %} {% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">Company Registration</h2>
          <form method="POST">
            <div class="mb-3">
              <label for="username" class="form-label">Company Name</label>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                required
              />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                required
              />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email (Optional)</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
              />
            </div>
            <button type="submit" class="btn btn-warning w-100">
              Register
            </button>
          </form>
          <hr />
          <p class="text-center text-muted">
            Your registration will be reviewed by admin
          </p>
          <p class="text-center">
            Already have an account? <a href="/login">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
